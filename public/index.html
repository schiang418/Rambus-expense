<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rambus Taiwan Expense Report Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    header .logo { font-size: 1.25rem; font-weight: 700; letter-spacing: .5px; }
    header .sub  { font-size: .85rem; color: #a0aec0; }

    /* ── Main layout ── */
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; color: #2d3748; }

    /* ── Drop zone ── */
    #dropzone {
      border: 2.5px dashed #cbd5e0;
      border-radius: 10px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    #dropzone.over { border-color: #4299e8; background: #ebf8ff; }
    #dropzone svg  { width: 48px; height: 48px; color: #a0aec0; margin-bottom: .75rem; }
    #dropzone p    { color: #718096; font-size: .95rem; }
    #dropzone strong { color: #4299e8; }
    #fileInput { display: none; }

    /* ── Employee name ── */
    .field-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .field-row label { font-weight: 500; white-space: nowrap; min-width: 140px; }
    .field-row input {
      flex: 1; padding: .5rem .75rem; border: 1.5px solid #e2e8f0;
      border-radius: 7px; font-size: .95rem;
    }
    .field-row input:focus { outline: none; border-color: #4299e8; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .6rem 1.4rem; border-radius: 8px; font-size: .95rem;
      font-weight: 600; cursor: pointer; border: none; transition: all .15s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #4299e8; color: #fff; }
    .btn-primary:hover { background: #3182ce; }
    .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; transform: none; }
    .btn-success { background: #38a169; color: #fff; }
    .btn-success:hover { background: #2f855a; }
    .btn-success:disabled { background: #a0aec0; cursor: not-allowed; transform: none; }
    .btn-sm { padding: .35rem .8rem; font-size: .82rem; font-weight: 500; }
    .btn-danger { background: #fc8181; color: #fff; }
    .btn-danger:hover { background: #e53e3e; }

    /* ── Progress ── */
    #progress {
      display: none; margin-top: 1rem;
      background: #ebf8ff; border-radius: 8px; padding: 1rem 1.25rem;
      font-size: .9rem; color: #2b6cb0;
    }
    #progress .bar-wrap { background: #bee3f8; border-radius: 99px; height: 6px; margin-top: .5rem; overflow: hidden; }
    #progress .bar { background: #4299e8; height: 100%; border-radius: 99px; transition: width .3s; }

    /* ── Table ── */
    #tableSection { display: none; }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th {
      background: #2d3748; color: #e2e8f0;
      padding: .6rem .75rem; text-align: left; white-space: nowrap;
    }
    td { padding: .5rem .75rem; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
    tr:hover td { background: #f7fafc; }
    td input, td select {
      width: 100%; padding: .3rem .5rem; border: 1.5px solid #e2e8f0;
      border-radius: 5px; font-size: .85rem; background: #fff;
    }
    td input:focus, td select:focus { outline: none; border-color: #4299e8; }
    .thumb { width: 48px; height: 64px; object-fit: cover; border-radius: 4px; cursor: pointer; }
    .ref-badge {
      display: inline-block; background: #ebf8ff; color: #2b6cb0;
      border-radius: 5px; padding: .15rem .5rem; font-weight: 700; font-size: .82rem;
    }

    /* ── Actions row ── */
    .actions { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-top: 1.25rem; }
    .actions .spacer { flex: 1; }

    /* ── Image modal ── */
    #modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 999;
      align-items: center; justify-content: center;
    }
    #modal.open { display: flex; }
    #modal img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    #modal .close-btn {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: #fff; border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: #2d3748; color: #fff; padding: .75rem 1.25rem;
      border-radius: 8px; font-size: .9rem; opacity: 0;
      transition: opacity .3s; pointer-events: none; z-index: 1000;
    }
    #toast.show { opacity: 1; }

    .error-row td { background: #fff5f5 !important; }
    .error-badge { color: #e53e3e; font-size: .78rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">Rambus Taiwan</div>
  <div class="sub">Expense Report Generator</div>
</header>

<main>

  <!-- Step 1: Upload -->
  <div class="card">
    <h2>Step 1 — Upload Receipts</h2>

    <div class="field-row">
      <label>Employee Name</label>
      <input type="text" id="employeeName" value="Samuel Chiang" placeholder="Full name" />
    </div>

    <div id="dropzone" onclick="document.getElementById('fileInput').click()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <p>Drag &amp; drop a <strong>ZIP file</strong> or <strong>JPEG images</strong> here</p>
      <p style="margin-top:.4rem;font-size:.82rem;color:#a0aec0">or click to browse</p>
    </div>
    <input type="file" id="fileInput" accept=".zip,.jpg,.jpeg" multiple />

    <div id="progress">
      <span id="progressText">Parsing receipts with AI…</span>
      <div class="bar-wrap"><div class="bar" id="progressBar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Step 2: Review & Edit -->
  <div class="card" id="tableSection">
    <h2>Step 2 — Review &amp; Edit Entries</h2>
    <div class="table-scroll">
      <table id="expenseTable">
        <thead>
          <tr>
            <th>Receipt</th>
            <th>Ref#</th>
            <th>Date (YYYY-MM-DD)</th>
            <th>Merchant</th>
            <th>Category</th>
            <th>Amount (TWD)</th>
            <th>Description</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="addRowBtn" onclick="addEmptyRow()">+ Add Row</button>
      <div class="spacer"></div>
      <button class="btn btn-success" id="generateBtn" onclick="generateReport()">
        ⬇ Generate &amp; Download Excel
      </button>
    </div>
  </div>

</main>

<!-- Image modal -->
<div id="modal">
  <button class="close-btn" onclick="closeModal()">✕</button>
  <img id="modalImg" src="" alt="Receipt" />
</div>

<div id="toast"></div>

<script>
const CATEGORIES = [
  'Airfare','Transportation','Lodging','Travel-Other',
  'Meals','Entertainment','Telephone','Office Supplies','Others'
];

let receipts = [];

// ── Drag & drop ──────────────────────────────────────────────────────────────
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  handleFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  if (!files || files.length === 0) return;
  // If multiple JPEGs, package them or send first file
  uploadFile(files[0]);
}

async function uploadFile(file) {
  const prog = document.getElementById('progress');
  const bar  = document.getElementById('progressBar');
  const txt  = document.getElementById('progressText');
  prog.style.display = 'block';
  txt.textContent = `Uploading ${file.name}…`;
  bar.style.width = '15%';

  const fd = new FormData();
  fd.append('file', file);

  try {
    bar.style.width = '40%';
    txt.textContent = 'Parsing receipts with AI vision…';
    const res = await fetch('/api/parse', { method: 'POST', body: fd });
    bar.style.width = '85%';
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Server error');
    }
    const data = await res.json();
    bar.style.width = '100%';
    txt.textContent = `✓ Parsed ${data.receipts.length} receipt(s)`;
    receipts = data.receipts;
    renderTable();
    document.getElementById('tableSection').style.display = 'block';
    document.getElementById('tableSection').scrollIntoView({ behavior: 'smooth' });
  } catch (e) {
    txt.textContent = `Error: ${e.message}`;
    bar.style.width = '100%';
    bar.style.background = '#fc8181';
    showToast('Upload failed: ' + e.message);
  }
}

// ── Table rendering ──────────────────────────────────────────────────────────
function renderTable() {
  // Re-assign Ref# after sort
  const sorted = [...receipts].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  sorted.forEach((r,i) => { r.ref = `${Math.floor(i/7)+1}${String.fromCharCode(65+(i%7))}`; });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  sorted.forEach(r => tbody.appendChild(buildRow(r)));
}

function buildRow(r) {
  const tr = document.createElement('tr');
  if (r.error) tr.classList.add('error-row');
  tr.dataset.id = r.id;

  const catOptions = CATEGORIES.map(c =>
    `<option value="${c}" ${c === r.category ? 'selected' : ''}>${c}</option>`
  ).join('');

  tr.innerHTML = `
    <td>
      ${r.imageBase64
        ? `<img class="thumb" src="data:image/jpeg;base64,${r.imageBase64}"
               onclick="openModal('${r.id}')" title="Click to enlarge" />`
        : '<span style="color:#a0aec0;font-size:.8rem">No image</span>'}
      ${r.error ? `<div class="error-badge">⚠ ${r.error}</div>` : ''}
    </td>
    <td><span class="ref-badge">${r.ref || ''}</span></td>
    <td><input type="text" value="${r.date||''}" onchange="updateField('${r.id}','date',this.value)" placeholder="YYYY-MM-DD" style="min-width:120px" /></td>
    <td><input type="text" value="${escHtml(r.merchant||'')}" onchange="updateField('${r.id}','merchant',this.value)" style="min-width:140px" /></td>
    <td><select onchange="updateField('${r.id}','category',this.value)">${catOptions}</select></td>
    <td><input type="number" value="${r.amount||0}" onchange="updateField('${r.id}','amount',+this.value)" style="min-width:90px;text-align:right" /></td>
    <td><input type="text" value="${escHtml(r.description||'')}" onchange="updateField('${r.id}','description',this.value)" style="min-width:160px" /></td>
    <td><button class="btn btn-danger btn-sm" onclick="deleteRow('${r.id}')">✕</button></td>
  `;
  return tr;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function updateField(id, field, value) {
  const r = receipts.find(x => x.id === id);
  if (r) {
    r[field] = value;
    if (field === 'date') renderTable(); // re-sort & re-ref
  }
}

function deleteRow(id) {
  receipts = receipts.filter(x => x.id !== id);
  renderTable();
}

function addEmptyRow() {
  receipts.push({
    id: crypto.randomUUID(),
    filename: '',
    imageBase64: '',
    date: '',
    amount: 0,
    merchant: '',
    category: 'Others',
    description: ''
  });
  renderTable();
  document.getElementById('tableSection').scrollIntoView({ behavior: 'smooth' });
}

// ── Generate Excel ────────────────────────────────────────────────────────────
async function generateReport() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  try {
    const payload = {
      employeeName: document.getElementById('employeeName').value || 'Samuel Chiang',
      receipts: receipts.map(r => ({
        id: r.id, date: r.date, amount: r.amount,
        merchant: r.merchant, category: r.category,
        description: r.description, ref: r.ref,
        imageBase64: r.imageBase64
      }))
    };

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Generation failed');
    }

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const cd   = res.headers.get('Content-Disposition') || '';
    const fnMatch = cd.match(/filename="([^"]+)"/);
    a.href     = url;
    a.download = fnMatch ? fnMatch[1] : 'Expense_Report.xlsx';
    a.click();
    URL.revokeObjectURL(url);
    showToast('✓ Excel report downloaded!');
  } catch (e) {
    showToast('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '⬇ Generate & Download Excel';
  }
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  const r = receipts.find(x => x.id === id);
  if (!r || !r.imageBase64) return;
  document.getElementById('modalImg').src = `data:image/jpeg;base64,${r.imageBase64}`;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
